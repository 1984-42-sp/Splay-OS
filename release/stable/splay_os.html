.connection-row button.danger{padding:6px 10px;font-size:11px}
.importance-badge{display:inline-block;margin-left:6px;font-size:9px;letter-spacing:.05em;padding:2px 8px;border-radius:999px;vertical-align:middle}
.importance-badge.imp-low{background:rgba(150,150,150,.18);color:#cfcfcf;border:1px solid rgba(150,150,150,.3)}
.importance-badge.imp-mid{background:rgba(126,217,238,.18);color:var(--cyan);border:1px solid rgba(126,217,238,.32)}
.importance-badge.imp-high{background:rgba(233,201,136,.2);color:var(--warn);border:1px solid rgba(233,201,136,.36)}
.importance-badge.imp-critical{background:rgba(236,154,154,.22);color:var(--danger);border:1px solid rgba(236,154,154,.4)}
.node.imp-low:not(.active){border-color:rgba(150,150,150,.42)}
.node.imp-mid:not(.active){border-color:rgba(126,217,238,.4)}
.node.imp-high:not(.active){border-color:rgba(233,201,136,.55);box-shadow:0 0 22px rgba(233,201,136,.16)}
.node.imp-critical:not(.active){border-color:rgba(236,154,154,.6);box-shadow:0 0 26px rgba(236,154,154,.2)}
.due-dot{position:absolute;right:46px;top:19px;width:8px;height:8px;border-radius:50%;z-index:5}
.due-dot.due-none{background:rgba(255,255,255,.2)}
.due-dot.due-ok{background:var(--mint);box-shadow:0 0 8px rgba(130,232,184,.7)}
.due-dot.due-soon{background:var(--warn);box-shadow:0 0 8px rgba(233,201,136,.7)}
.due-dot.due-today{background:#ef9b4e;box-shadow:0 0 9px rgba(239,155,78,.85)}
.due-dot.due-overdue{background:var(--danger);box-shadow:0 0 9px rgba(236,154,154,.85)}
.due-dot.due-done{background:var(--mint);box-shadow:0 0 6px rgba(130,232,184,.5)}
.due-badge{position:absolute;left:14px;bottom:12px;font-size:9px;letter-spacing:.04em;padding:2px 8px;border-radius:999px;opacity:.92}
.due-badge.due-none{background:rgba(255,255,255,.08);color:var(--mute)}
.due-badge.due-ok{background:rgba(130,232,184,.16);color:var(--mint)}
.due-badge.due-soon{background:rgba(233,201,136,.18);color:var(--warn)}
.due-badge.due-today{background:rgba(239,155,78,.2);color:#ef9b4e}
.due-badge.due-overdue{background:rgba(236,154,154,.2);color:var(--danger)}
.due-badge.due-done{background:rgba(130,232,184,.16);color:var(--mint)}
@media(max-width:760px){.home-grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.minimap{display:none!important}.log-drawer{width:calc(100vw - 48px)}.node{width:230px}.hud{left:24px;transform:none;text-align:left}.top-actions{display:none}.canvas-wrap{inset:78px 0 0}.ws-header{display:none!important}.home-simple{margin-top:3vh}}
</style>
</head>
<body>
<div class="app">
  <div class="hud"><h1>Splay OS</h1><div class="sub" id="hudSub">Decision Canvas · v0.6.3.2</div></div>
  <div class="top-actions" id="topActions" data-float="bar"><button onclick="togglePalette()">⌘K</button><button onclick="closeWorkspace()">Spaceを閉じる</button></div>
  <section class="home show" id="homeView"></section>
  <section class="canvas-wrap" id="canvasWrap"><div class="canvas" id="canvas"><svg class="link-svg" id="linkSvg"></svg><div id="nodeLayer"></div></div></section>
  <div class="minimap" id="minimap" data-float="bar"><svg class="mini-conn-svg" id="miniConnSvg"></svg><div class="mini-view" id="miniView"></div></div>
  <div class="zoom-pill" id="zoomPill" data-float="bar"><button onclick="zoomBy(.12)">＋</button><button onclick="zoomBy(-.12)">－</button><button onclick="resetView()">◎</button></div>
  <div class="orb splay-orb" id="splayOrb" data-float="orb"><span class="glyph">✦</span></div><div class="orb-menu" id="splayMenu"></div>
  <div class="orb workspace-orb" id="workspaceOrb" data-float="orb"><span class="orbit-ring"></span><span class="orbit-ring2"></span><span class="orbit-dot"></span><span class="orbit-dot2"></span><span class="glyph">◉</span></div><div class="orb-menu" id="workspaceMenu"></div>
  <div class="ws-header" id="wsHeader"><span class="ws-header-icon" id="wsHeaderIcon"></span><div class="ws-header-text"><b id="wsHeaderName"></b><div class="ws-header-desc" id="wsHeaderDesc"></div></div></div>
  <div class="float-panel shape-inspector" id="shapeInspector" data-float="panel"><div class="panel-head"><b>Object Editor</b><button onclick="closeShapeInspector()">✕</button></div><div class="panel-body" id="shapeInspectorBody"></div></div>
  <div class="palette" id="palette"><input id="paletteInput" placeholder="Command / Workspace / Node を検索…"><div class="command-list" id="commandList"></div></div>
  <div class="float-panel detail-panel" id="detailPanel" data-float="panel"><div class="panel-head"><b id="detailTitle">Node</b><div><button onclick="deleteActiveNode()" class="danger">削除</button><button onclick="closeDetail()">✕</button></div></div><div class="panel-body" id="detailBody"></div></div>
  <div class="float-panel log-drawer" id="logDrawer" data-float="panel"><div class="panel-head"><b>Activity Log</b><button onclick="toggleLog()">✕</button></div><div class="log-list" id="logList"></div></div>
  <div class="float-panel vault-panel" id="vaultPanel" data-float="panel"><div class="panel-head"><b>Vault</b><div><button onclick="addVaultLink()">＋資料</button><button onclick="toggleVault()">✕</button></div></div><div class="panel-body" id="vaultBody"></div></div>
  <div class="float-panel ws-settings-panel" id="wsSettingsPanel" data-float="panel"><div class="panel-head"><b>Workspace Settings</b><button onclick="closeWorkspaceSettings()">✕</button></div><div class="panel-body" id="wsSettingsBody"></div></div>
  <div class="float-panel confirm-modal" id="confirmModal" data-float="panel"><div class="panel-head"><b>確認</b></div><div class="panel-body"><p id="confirmMessage" style="color:var(--dim);line-height:1.7;white-space:pre-line"></p><div class="confirm-actions"><button id="confirmCancel">キャンセル</button><button class="danger" id="confirmOk">削除</button></div></div></div>
  <div class="create-menu" id="createMenu"></div><div class="save-state" id="saveState">localStorage · autosaved</div>
</div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
<script>
const STORAGE_KEY='splay_os_state_v5';
const LEGACY_KEYS=['splay_os_state_v4','splay_os_state_v3','splay_os_state_v2','splay_os_state_v1'];
function uid(p){return p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4)}
function nowStr(){return new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
const labels={note:'Note',memo:'Memo',decision:'Decision',task:'Task',meeting:'Meeting',file:'File / Link'};
const tagCls={note:'tag-note',memo:'tag-memo',decision:'tag-decision',task:'tag-task',meeting:'tag-meeting',file:'tag-file'};
const SHAPE_PALETTE={decision:'squircle',task:'rounded',note:'pill',memo:'circle',meeting:'organic',file:'rounded'};
const DEFAULT_RADIUS=50;
const ACCENT_COLORS={mint:{name:'Mint',c:'130,232,184'},cyan:{name:'Cyan',c:'126,217,238'},purple:{name:'Purple',c:'184,168,238'},amber:{name:'Amber',c:'233,201,136'},rose:{name:'Rose',c:'236,154,154'},green:{name:'Green',c:'140,216,150'},blue:{name:'Blue',c:'120,170,230'}};
const WS_ICON_DEFAULTS={Command:'🏠',Strategy:'📈',Meeting:'🤝',Finance:'💰',Research:'🔬',Vault:'🔒'};
const WS_ACCENT_DEFAULTS={Command:'mint',Strategy:'cyan',Meeting:'purple',Finance:'amber',Research:'rose',Vault:'green'};
const ICON_PRESETS=['🏠','📈','🤝','💰','🔬','🔒','🪐','✦','🌙','🌊','🔥','🌿','📦','🧭'];
const decisionStatuses=['未検討','検討中','仮決定','決定','保留','却下'];
const taskStatuses=['TODO','Doing','Waiting','Blocked','Done'];
/* === v0.6.3 Connection / Anchor Editor: additive constants === */
const CONNECTION_TYPES={
  related:{label:'Related',color:'126,217,238',dash:''},
  evidence:{label:'Evidence',color:'130,232,184',dash:''},
  task:{label:'Task',color:'184,168,238',dash:''},
  risk:{label:'Risk',color:'236,154,154',dash:'7,6'},
  decision:{label:'Decision',color:'233,201,136',dash:''},
  file:{label:'File',color:'120,170,230',dash:'2,5'},
  memo:{label:'Memo',color:'244,239,223',dash:''}
};
const CONNECTION_TYPE_KEYS=Object.keys(CONNECTION_TYPES);
const ANCHOR_KEYS=['auto','top','right','bottom','left','center'];
const IMPORTANCE_LEVELS=['低','中','高','最重要'];
const IMPORTANCE_CLASS={'低':'imp-low','中':'imp-mid','高':'imp-high','最重要':'imp-critical'};
let zTop=200;
function defaultState(){
  const wsNames=['Command','Strategy','Meeting','Finance','Research','Vault']; const ws={}; wsNames.forEach(n=>ws[n]=uid('ws'));
  const nodes=[]; const dts=['出店エリア','家賃上限','店舗面積','想定客単価','ソンス風再現度','駐車場要否','金融機関説明方針','候補物件絞り込み条件'];
  dts.forEach((t,i)=>nodes.push({id:uid('node'),type:'decision',workspaceId:ws.Strategy,title:t,x:620+(i%4)*330,y:520+Math.floor(i/4)*230,w:260,h:130,shape:SHAPE_PALETTE.decision,radius:DEFAULT_RADIUS,z:10+i,links:[],connections:[],createdAt:Date.now(),updatedAt:Date.now(),data:{theme:t,status:'未検討',importance:'中',hypothesis:'',evidence:'',pros:'',cons:'',risk:'',decision:'',nextCheck:'',memo:''}}));
  ['次回会議で家賃上限を決める','候補物件を10件に絞る','ソンス風カフェの参考写真を集める','金融機関向け説明資料の骨子を作る'].forEach((t,i)=>nodes.push({id:uid('node'),type:'task',workspaceId:ws.Strategy,title:t,x:720+(i%2)*360,y:1080+Math.floor(i/2)*210,w:260,h:126,shape:SHAPE_PALETTE.task,radius:DEFAULT_RADIUS,z:30+i,links:[],connections:[],createdAt:Date.now(),updatedAt:Date.now(),data:{name:t,status:'TODO',owner:'',due:'',importance:'中',memo:''}}));
  [{name:'物件統合マップ',url:'all_properties_map.html'},{name:'事業計画・融資向け分析レポート',url:'cafe_business_analysis_report.html'},{name:'営業シミュレーション一覧',url:'simulation_index.html'},{name:'カフェ事業ダッシュボード',url:'cafe_business_dashboard.html'}].forEach((f,i)=>nodes.push({id:uid('node'),type:'file',workspaceId:ws.Vault,title:f.name,x:650+(i%2)*360,y:560+Math.floor(i/2)*220,w:260,h:126,shape:SHAPE_PALETTE.file,radius:DEFAULT_RADIUS,z:50+i,links:[],connections:[],createdAt:Date.now(),updatedAt:Date.now(),data:{name:f.name,url:f.url,memo:''}}));
  return {version:'0.6.3.2',mode:'home',workspaces:Object.entries(ws).map(([name,id])=>({id,name,description:'',icon:WS_ICON_DEFAULTS[name]||'🪐',accentColor:WS_ACCENT_DEFAULTS[name]||'cyan'})),activeWorkspaceId:ws.Strategy,activeNodeId:null,nodes,view:{x:-360,y:-290,scale:1},todayFocus:'会議で決める論点を絞り、根拠と未決事項を見える状態にする',logs:[{id:uid('log'),time:nowStr(),text:'Splay OS v0.6.3.2 Connection Selection Hotfix 初期化'}],ui:{splayOrb:{x:28,y:null,bottom:28},workspaceOrb:{x:null,y:null,right:28,bottom:28}},vaultUnlocked:false,vaultPassword:'1234'};
}
function migrate(st){
  if(!st||!st.workspaces||!st.nodes)return defaultState();
  st.version='0.6.3.2'; st.view=st.view||{x:-360,y:-290,scale:1}; st.mode=st.mode||'home'; st.ui=st.ui||{};
  st.ui.splayOrb=st.ui.splayOrb||{x:28,bottom:28}; st.ui.workspaceOrb=st.ui.workspaceOrb||{right:28,bottom:28};
  ['topActions','zoomPill','minimap'].forEach(k=>{st.ui[k]=st.ui[k]||{}});
  st.workspaces.forEach(ws=>{
    if(typeof ws.description!=='string')ws.description='';
    if(typeof ws.icon!=='string'||!ws.icon.trim())ws.icon=WS_ICON_DEFAULTS[ws.name]||'🪐';
    if(typeof ws.accentColor!=='string'||!ACCENT_COLORS[ws.accentColor])ws.accentColor=WS_ACCENT_DEFAULTS[ws.name]||'cyan';
  });
  st.nodes.forEach((n,i)=>{
    if(typeof n.x!=='number')n.x=520+(i%4)*330; if(typeof n.y!=='number')n.y=520+Math.floor(i/4)*220; if(typeof n.z!=='number')n.z=10+i; if(!Array.isArray(n.links))n.links=[]; if(!n.data)n.data={};
    if(n.type==='file'&&n.data.memo==null)n.data.memo=''; if(n.type==='decision'&&n.data.memo==null)n.data.memo=''; if(n.type==='note'&&n.data.memo==null)n.data.memo=''; if(n.type==='memo'&&n.data.body==null)n.data.body=''; if(!n.w)n.w=260; if(!n.h)n.h=n.type==='memo'?118:126; if(!n.shape)n.shape='organic'; if(typeof n.radius!=='number'||!Number.isFinite(n.radius))n.radius=DEFAULT_RADIUS; if(!n.links)n.links=[];
    /* v0.6.3 additive migration: connections[] + Task importance */
    if(!Array.isArray(n.connections))n.connections=[];
    n.connections.forEach(c=>{
      if(!c.id)c.id=uid('conn');
      if(!CONNECTION_TYPES[c.type])c.type='related';
      if(typeof c.label!=='string')c.label='';
      if(!ANCHOR_KEYS.includes(c.fromAnchor))c.fromAnchor='auto';
      if(!ANCHOR_KEYS.includes(c.toAnchor))c.toAnchor='auto';
      if(typeof c.style!=='string')c.style='';
    });
    if(n.type==='task'&&!IMPORTANCE_LEVELS.includes(n.data.importance))n.data.importance='中';
    if(n.type==='task'&&n.data.due==null)n.data.due='';
  });
  return st;
}
function load(){try{let raw=localStorage.getItem(STORAGE_KEY); if(!raw){for(const k of LEGACY_KEYS){raw=localStorage.getItem(k); if(raw)break}} return raw?migrate(JSON.parse(raw)):defaultState()}catch(e){return defaultState()}}
let state=load();
function save(flash=false){localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); if(flash){const el=document.getElementById('saveState');el.textContent='saved · '+nowStr();setTimeout(()=>el.textContent='localStorage · autosaved',1300)}}
function log(text){state.logs.unshift({id:uid('log'),time:nowStr(),text}); if(state.logs.length>300)state.logs.pop(); save(); renderLog()}
function count(){let decided=0,considering=0,pending=0,open=0;state.nodes.forEach(n=>{if(n.type==='decision'){if(['決定','仮決定'].includes(n.data.status))decided++;else if(n.data.status==='検討中')considering++;else if(n.data.status==='保留')pending++} if(n.type==='task'&&n.data.status!=='Done')open++});return{decided,considering,pending,open}}
function activeWs(){return state.workspaces.find(w=>w.id===state.activeWorkspaceId)||state.workspaces[0]}
function openWorkspace(id){state.activeWorkspaceId=id;state.mode='workspace';state.activeNodeId=null;closeShapeInspector();save();render();log('Workspaceを開く: '+(activeWs()?.name||''))}
function closeWorkspace(){state.mode='home';state.activeNodeId=null;closeShapeInspector();save();render();}
function addWorkspace(){const name=prompt('Workspace名');if(!name)return;const ws={id:uid('ws'),name:name.trim(),description:'',icon:'🪐',accentColor:'cyan'};state.workspaces.push(ws);state.activeWorkspaceId=ws.id;state.mode='workspace';log('Workspace Created: '+ws.name);save();render()}
function deleteWorkspace(id){
  const ws=state.workspaces.find(w=>w.id===id);
  if(!ws)return;
  showConfirm('「'+ws.name+'」を削除しますか？\nWorkspace内のNodeもすべて削除されます。この操作は元に戻せません。',()=>{
    state.nodes=state.nodes.filter(n=>n.workspaceId!==id);
    state.workspaces=state.workspaces.filter(w=>w.id!==id);
    state.activeWorkspaceId=state.workspaces[0]?.id||null;
    state.mode='home';
    state.activeNodeId=null;
    closeShapeInspector();
    closeWorkspaceSettings();
    document.getElementById('detailPanel').classList.remove('show');
    log('Workspace Deleted: '+ws.name);
    save();render();
  });
}
function createNode(type){const ws=activeWs(); if(!ws){addWorkspace();return} const center=screenToCanvas(innerWidth/2,innerHeight/2); const data={note:{body:'',memo:''},memo:{body:''},decision:{theme:'',status:'未検討',importance:'中',hypothesis:'',evidence:'',pros:'',cons:'',risk:'',decision:'',nextCheck:'',memo:''},task:{name:'',status:'TODO',owner:'',due:'',importance:'中',memo:''},meeting:{meetingName:'',date:'',agenda:'',notes:'',decisions:'',pending:'',nextActions:'',memo:''},file:{name:'',url:'',memo:''}}[type]; const n={id:uid('node'),type,workspaceId:ws.id,title:type==='memo'?'Memo':'新しい'+labels[type],x:center.x-130+Math.random()*80,y:center.y-70+Math.random()*80,w:type==='memo'?220:260,h:type==='memo'?118:126,shape:SHAPE_PALETTE[type]||'organic',radius:DEFAULT_RADIUS,z:++zTop,links:[],connections:[],createdAt:Date.now(),updatedAt:Date.now(),data}; state.nodes.push(n); state.activeNodeId=n.id; log('Node追加: ['+labels[type]+'] '+n.title); save(); render(); openDetail(n.id)}
function activeNodes(){const ws=activeWs();return state.nodes.filter(n=>n.workspaceId===ws?.id)}
function nodeTitle(n){if(n.type==='decision')return n.data.theme||n.title;if(n.type==='task')return n.data.name||n.title;if(n.type==='meeting')return n.data.meetingName||n.title;if(n.type==='file')return n.data.name||n.title;if(n.type==='memo')return (n.data.body||'Memo').split('\n')[0].slice(0,28)||'Memo';return n.title}
function openDetail(id){state.activeNodeId=id; const n=state.nodes.find(x=>x.id===id); if(n)n.z=++zTop; save(); renderNodes(); renderLinks(); renderDetail(); const p=document.getElementById('detailPanel'); p.classList.add('show'); touchFloat(p)}
function closeDetail(){document.getElementById('detailPanel').classList.remove('show');state.activeNodeId=null;closeShapeInspector();save();renderNodes();renderLinks()}
function deleteActiveNode(){if(!state.activeNodeId)return; const n=state.nodes.find(x=>x.id===state.activeNodeId); if(!n||!confirm('「'+nodeTitle(n)+'」を削除しますか？'))return; state.nodes.forEach(x=>{x.links=(x.links||[]).filter(id=>id!==n.id); if(Array.isArray(x.connections))x.connections=x.connections.filter(c=>c.targetId!==n.id)}); state.nodes=state.nodes.filter(x=>x.id!==n.id); log('Node削除: '+nodeTitle(n)); state.activeNodeId=null; closeShapeInspector(); save(); render();}
function updateNode(id,key,val,isTitle=false){const n=state.nodes.find(x=>x.id===id);if(!n)return;if(isTitle)n.title=val;else n.data[key]=val;n.updatedAt=Date.now();save();renderNodes();renderLinks();renderMinimap()}
function changeStatus(id,val){const n=state.nodes.find(x=>x.id===id);if(!n)return;const old=n.data.status;n.data.status=val;n.updatedAt=Date.now();if(old!==val)log('ステータス変更: '+nodeTitle(n)+' '+old+' → '+val);save();renderNodes();renderDetail();renderHome()}
function toggleTaskDone(id,e){e.stopPropagation();const n=state.nodes.find(x=>x.id===id);if(!n)return;const old=n.data.status;n.data.status=old==='Done'?'TODO':'Done';n.updatedAt=Date.now();log((n.data.status==='Done'?'タスク完了: ':'タスク未完了へ戻す: ')+nodeTitle(n));save();render();}
function showConfirm(message,onConfirm){
  document.getElementById('confirmMessage').textContent=message;
  const modal=document.getElementById('confirmModal');
  modal.classList.add('show');
  touchFloat(modal);
  const ok=document.getElementById('confirmOk');
  const cancel=document.getElementById('confirmCancel');
  const cleanup=()=>{modal.classList.remove('show');ok.onclick=null;cancel.onclick=null};
  ok.onclick=()=>{cleanup();onConfirm()};
  cancel.onclick=()=>{cleanup()};
}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('show')}

let wsSettingsId=null;
function openWorkspaceSettings(id){
  const ws=state.workspaces.find(w=>w.id===id)||activeWs();
  if(!ws)return;
  wsSettingsId=ws.id;
  renderWorkspaceSettingsBody();
  const panel=document.getElementById('wsSettingsPanel');
  panel.classList.add('show');
  touchFloat(panel);
}
function closeWorkspaceSettings(){wsSettingsId=null;document.getElementById('wsSettingsPanel').classList.remove('show')}
function renderWorkspaceSettingsBody(){
  const ws=state.workspaces.find(w=>w.id===wsSettingsId);
  const body=document.getElementById('wsSettingsBody');
  if(!ws){body.innerHTML='<p class="hint">Workspaceが選択されていません。</p>';return}
  body.innerHTML=`
    <label>Workspace Name</label>
    <input value="${esc(ws.name)}" oninput="liveSetWorkspaceField('${ws.id}','name',this.value)" onchange="commitWorkspaceField('${ws.id}','name',this.value,'Workspace Renamed')">
    <label>Description</label>
    <textarea placeholder="このWorkspaceの目的やメモ…" oninput="liveSetWorkspaceField('${ws.id}','description',this.value)" onchange="commitWorkspaceField('${ws.id}','description',this.value,'Workspace Description Updated')">${esc(ws.description||'')}</textarea>
    <label>Icon</label>
    <div class="icon-presets">${ICON_PRESETS.map(ic=>`<button type="button" class="${ws.icon===ic?'active-icon':''}" onclick="setWorkspaceIcon('${ws.id}','${ic}')">${ic}</button>`).join('')}</div>
    <input style="margin-top:8px" maxlength="4" placeholder="カスタム絵文字…" value="${ICON_PRESETS.includes(ws.icon)?'':esc(ws.icon||'')}" oninput="liveSetWorkspaceField('${ws.id}','icon',this.value)" onchange="commitWorkspaceField('${ws.id}','icon',this.value,'Workspace Icon Changed')">
    <label>Accent Color</label>
    <div class="accent-grid">${Object.entries(ACCENT_COLORS).map(([key,a])=>`<button type="button" class="accent-swatch ${ws.accentColor===key?'active-accent':''}" style="--sw:${a.c}" title="${a.name}" onclick="setWorkspaceAccent('${ws.id}','${key}')"></button>`).join('')}</div>
    <button type="button" class="danger" style="margin-top:20px" onclick="deleteWorkspace('${ws.id}')">🗑 Delete Workspace</button>
  `;
}
function liveSetWorkspaceField(id,key,value){
  const ws=state.workspaces.find(w=>w.id===id);
  if(!ws)return;
  ws[key]=value;
  save();
  if(key==='name'){renderHome();renderMenus();renderWsHeader()}
  if(key==='description'){renderWsHeader()}
  if(key==='icon'){renderMenus();renderHome();renderWsHeader()}
}
function commitWorkspaceField(id,key,value,actionLabel){

function anchorPoint(n,anchor,towardPoint){
  const w=nodeW(n),h=nodeH(n),cx=n.x+w/2,cy=n.y+h/2;
  if(anchor==='top')return{x:cx,y:n.y};
  if(anchor==='bottom')return{x:cx,y:n.y+h};
  if(anchor==='left')return{x:n.x,y:cy};
  if(anchor==='right')return{x:n.x+w,y:cy};
  if(anchor==='center')return{x:cx,y:cy};
  if(towardPoint){
    const dx=towardPoint.x-cx,dy=towardPoint.y-cy;
    if(Math.abs(dx)>=Math.abs(dy))return dx>=0?{x:n.x+w,y:cy}:{x:n.x,y:cy};
    return dy>=0?{x:cx,y:n.y+h}:{x:cx,y:n.y};
  }
  return{x:cx,y:cy};
}

function nodeW(n){
  const w = Number(n && n.w);
  return Math.max(88, Number.isFinite(w) && w > 0 ? w : (n && n.type === 'memo' ? 220 : 260));
}
function nodeH(n){
  const h = Number(n && n.h);
  return Math.max(72, Number.isFinite(h) && h > 0 ? h : (n && n.type === 'memo' ? 118 : 126));
}
function hashId(id){let h=0;const s=String(id||'');for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0}return Math.abs(h)}
function shapeRadius(n,w,h){
  const shape=(n&&n.shape)||'organic';
  const radius=(n&&typeof n.radius==='number'&&Number.isFinite(n.radius))?n.radius:DEFAULT_RADIUS;
  const min=Math.max(1,Math.min(Number(w)||1,Number(h)||1));
  if(shape==='circle') return '50%';
  if(shape==='pill') return '999px';
  if(shape==='squircle') return Math.round(min*(0.14+(radius/100)*0.36))+'px';
  if(shape==='rounded') return Math.round(14+(radius/100)*42)+'px';
  if(shape==='organic'){
    const base=18+(radius/100)*40;
    const hv=hashId(n&&n.id);
    const j=(seed)=>Math.max(6,Math.round(base+(((hv>>seed)&15)-7))); 
    return j(0)+'px '+j(4)+'px '+j(8)+'px '+j(12)+'px / '+j(16)+'px '+j(20)+'px '+j(2)+'px '+j(6)+'px';
  }
  return Math.round(14+(radius/100)*42)+'px';
}
function cycleShape(shape){

}

/* === v0.6.3: Task due-date visualization helpers (additive) === */
function taskDueState(n){
  if(n.type!=='task')return null;
  if(n.data.status==='Done')return 'done';
  const due=n.data.due;
  if(!due)return 'none';
  const d=new Date(due+'T00:00:00'); if(isNaN(d.getTime()))return 'none';
  const today=new Date(); today.setHours(0,0,0,0);
  const diffDays=Math.round((d-today)/86400000);
  if(diffDays<0)return 'overdue';
  if(diffDays===0)return 'today';
  if(diffDays<=3)return 'soon';
  return 'ok';
}

  renderLinks();

}

function positionOrbs(){[['splayOrb',state.ui.splayOrb],['workspaceOrb',state.ui.workspaceOrb]].forEach(([id,pos])=>{const el=document.getElementById(id); if(pos.x!=null){el.style.left=pos.x+'px';el.style.top=(pos.y??(innerHeight-94))+'px';el.style.right='auto';el.style.bottom='auto'}else{el.style.left='auto';el.style.top='auto';el.style.right=(pos.right??28)+'px';el.style.bottom=(pos.bottom??28)+'px'} if(pos.w)el.style.width=pos.w+'px'; if(pos.h)el.style.height=pos.h+'px'});applyFloatState('topActions','topActions');applyFloatState('zoomPill','zoomPill');applyFloatState('minimap','minimap')}
function touchFloat(el){zTop++;document.querySelectorAll('[data-float]').forEach(x=>{x.classList.toggle('dimmed',x!==el)});el.classList.add('active');el.style.zIndex=zTop;clearTimeout(window.__dimTimer);window.__dimTimer=setTimeout(()=>{document.querySelectorAll('[data-float]').forEach(x=>x.classList.remove('dimmed','active'))},1000)}
function renderMinimap(){const m=document.getElementById('minimap');if(state.mode!=='workspace')return;m.querySelectorAll('.mini-node,.mini-center,.mini-cross-x,.mini-cross-y').forEach(x=>x.remove());const r=m.getBoundingClientRect();const mw=Math.max(42,r.width),mh=Math.max(42,r.height);const center=screenToCanvas(innerWidth/2,innerHeight/2);const scale=Math.min(mw/2600,mh/1800);
  const toMini=n=>({x:mw/2+(n.x+nodeW(n)/2-center.x)*scale,y:mh/2+(n.y+nodeH(n)/2-center.y)*scale});
  const miniSvg=document.getElementById('miniConnSvg'); if(miniSvg)miniSvg.innerHTML='';
  /* v0.6.3: simplified connection lines on minimap */
  if(miniSvg){const ns='http://www.w3.org/2000/svg';activeNodes().forEach(a=>{(a.connections||[]).forEach(c=>{const b=state.nodes.find(x=>x.id===c.targetId&&x.workspaceId===a.workspaceId);if(!b)return;const p1=toMini(a),p2=toMini(b);const ct=CONNECTION_TYPES[c.type]||CONNECTION_TYPES.related;const line=document.createElementNS(ns,'line');line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);line.setAttribute('stroke',`rgba(${ct.color},.5)`);line.setAttribute('stroke-width','1');miniSvg.appendChild(line)})})}
  activeNodes().forEach(n=>{const d=document.createElement('div');d.className='mini-node';const w=Math.max(5,nodeW(n)*scale),h=Math.max(5,nodeH(n)*scale);d.style.width=w+'px';d.style.height=h+'px';d.style.borderRadius=shapeRadius(n,w,h);const p=toMini(n);d.style.left=p.x+'px';d.style.top=p.y+'px';m.appendChild(d)});const v=document.getElementById('miniView');v.style.left=(mw/2-(innerWidth/state.view.scale*scale)/2)+'px';v.style.top=(mh/2-(innerHeight/state.view.scale*scale)/2)+'px';v.style.width=(innerWidth/state.view.scale*scale)+'px';v.style.height=(innerHeight/state.view.scale*scale)+'px';['mini-cross-x','mini-cross-y','mini-center'].forEach(cls=>{const e=document.createElement('div');e.className=cls;m.appendChild(e)})}
function togglePalette(){const p=document.getElementById('palette');p.classList.toggle('show');touchFloat(p);renderCommands();setTimeout(()=>document.getElementById('paletteInput').focus(),30)}
function renderCommands(){const q=(document.getElementById('paletteInput').value||'').toLowerCase();const cmds=[['Home',()=>closeWorkspace()],['Open Vault',()=>toggleVault()],['Activity Log',()=>toggleLog()],['New Workspace',()=>addWorkspace()],['Workspace Settings',()=>openWorkspaceSettings(state.activeWorkspaceId||state.workspaces[0]?.id)],['Add Decision',()=>createNode('decision')],['Add Task',()=>createNode('task')],['Add Note',()=>createNode('note')],['Add Memo',()=>createNode('memo')],['Export JSON',()=>exportJSON()],['Import JSON',()=>document.getElementById('importFile').click()],...state.workspaces.map(w=>['Workspace: '+w.name,()=>openWorkspace(w.id)]),...state.nodes.map(n=>['Node: '+nodeTitle(n),()=>{openWorkspace(n.workspaceId);openDetail(n.id)}])].filter(c=>c[0].toLowerCase().includes(q));document.getElementById('commandList').innerHTML=cmds.slice(0,40).map((c,i)=>`<div class="command-item" data-i="${i}">${esc(c[0])}</div>`).join('');document.querySelectorAll('.command-item').forEach((el,i)=>el.onclick=()=>{document.getElementById('palette').classList.remove('show');cmds[i][1]()})}
document.getElementById('paletteInput').addEventListener('input',renderCommands);document.getElementById('paletteInput').addEventListener('keydown',e=>{if(e.key==='Enter'){const first=document.querySelector('.command-item');if(first)first.click()}})
function toggleLog(){const p=document.getElementById('logDrawer');p.classList.toggle('show');touchFloat(p)}
function toggleVault(){const p=document.getElementById('vaultPanel');p.classList.toggle('show');renderVault();touchFloat(p)}
function exportJSON(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='splay_os_v0632_connection_selection_hotfix_'+Date.now()+'.json';a.click();log('JSON Export')}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{state=migrate(JSON.parse(ev.target.result));log('JSON Import');save();render()}catch(err){alert('Import失敗')}};r.readAsText(f);e.target.value=''}
function resetAll(){if(confirm('初期状態に戻しますか？')){state=defaultState();save();render()}}
window.addEventListener('keydown',e=>{const tag=(document.activeElement?.tagName||'').toLowerCase();const typing=['input','textarea','select'].includes(tag);if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();togglePalette();return}if(e.key==='Escape'){if(connDrag){cancelConnectionDrag();return}if(selectedConnection){clearSelectedConnection();return}hideMenus();document.getElementById('palette').classList.remove('show');document.getElementById('detailPanel').classList.remove('show');document.getElementById('createMenu').classList.remove('show');closeShapeInspector();closeWorkspaceSettings();closeConfirm();return}if(!typing&&selectedConnection&&(e.key==='Delete'||e.key==='Backspace')){e.preventDefault();removeConnection(selectedConnection.fromId,selectedConnection.connId);selectedConnection=null;return}if(typing)return;if(e.key.toLowerCase()==='n')createNode('note');if(e.key.toLowerCase()==='m')createNode('memo');if(e.key.toLowerCase()==='w')toggleWorkspaceMenu(true);if(e.key.toLowerCase()==='l')toggleLog()});
makeOrbDraggable(document.getElementById('splayOrb'),toggleSplayMenu);makeOrbDraggable(document.getElementById('workspaceOrb'),()=>toggleWorkspaceMenu());initFloatingControls();
window.addEventListener('resize',()=>{renderMenus();renderMinimap();positionOrbs();if(shapeInspectorNodeId)positionShapeInspector(shapeInspectorNodeId)});
render();save();
</script>
