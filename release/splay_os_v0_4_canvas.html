<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splay OS v0.4 Canvas</title>
<style>
:root{
  --deep:#07120f; --mid:#0d211e; --panel:rgba(18,38,36,.62); --panel2:rgba(13,27,29,.54);
  --ivory:#f4efdf; --dim:#c8c9bd; --mute:#8e948b;
  --mint:#82e8b8; --cyan:#7ed9ee; --lav:#b8a8ee; --warn:#e9c988; --danger:#ec9a9a;
  --line:rgba(255,255,255,.09); --line2:rgba(127,232,184,.24);
  --shadow:0 24px 80px rgba(0,0,0,.34); --glow:0 0 34px rgba(130,232,184,.14);
}
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;color:var(--ivory);font-family:"Yu Gothic UI","Hiragino Sans","Segoe UI",sans-serif;background:#07120f;}
body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 10% 20%,rgba(126,217,238,.11),transparent 34%),radial-gradient(circle at 85% 75%,rgba(184,168,238,.10),transparent 35%),radial-gradient(circle at 50% 50%,rgba(130,232,184,.05),transparent 45%),linear-gradient(145deg,#07120f,#0d211e 45%,#091917);animation:drift 18s ease-in-out infinite alternate;z-index:-2} @keyframes drift{from{transform:translate(-2%,-1%) scale(1)}to{transform:translate(2%,1.5%) scale(1.04)}}
body:after{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(circle at center,black,transparent 78%);pointer-events:none;z-index:-1}
button,input,textarea,select{font-family:inherit} button{border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--ivory);border-radius:999px;padding:9px 15px;cursor:pointer;transition:.22s ease} button:hover{background:rgba(130,232,184,.16);transform:translateY(-1px)} button.primary{background:linear-gradient(135deg,rgba(130,232,184,.35),rgba(126,217,238,.18));border-color:rgba(130,232,184,.34)} button.danger{background:rgba(236,154,154,.12);border-color:rgba(236,154,154,.25)}
input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--ivory);border-radius:22px;padding:10px 14px;outline:none;font-size:13px;min-width:0} textarea{min-height:70px;resize:vertical;line-height:1.55} input:focus,textarea:focus,select:focus{border-color:rgba(130,232,184,.44);background:rgba(255,255,255,.08)} label{display:block;font-size:11px;letter-spacing:.06em;color:var(--dim);margin:14px 0 6px}
a{color:var(--cyan);overflow-wrap:anywhere;word-break:break-word}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(130,232,184,.25);border-radius:99px}::-webkit-scrollbar-track{background:transparent}
.app{position:fixed;inset:0;overflow:hidden}.hud{position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:40;text-align:center;pointer-events:none}.hud h1{margin:0;font-size:20px;font-weight:650;letter-spacing:.08em}.hud .sub{margin-top:6px;color:var(--dim);font-size:11px;letter-spacing:.08em}.top-actions{position:fixed;top:24px;right:28px;z-index:50;display:flex;gap:9px}.soft-chip{border-radius:999px;padding:8px 13px;border:1px solid var(--line);background:rgba(10,22,20,.42);backdrop-filter:blur(18px);color:var(--dim);font-size:12px}
.home{position:absolute;inset:105px 7vw 60px;display:none;overflow:auto;padding:12px}.home.show{display:block}.home-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;max-width:1180px;margin:auto}.home-card{background:var(--panel);border:1px solid var(--line);border-radius:44px 34px 50px 32px;padding:28px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.home-card:nth-child(2){border-radius:34px 52px 36px 48px}.home-card h2{margin:0 0 8px;font-size:24px}.home-card p{color:var(--dim);line-height:1.75}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:22px}.kpi{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:28px 20px 28px 20px;padding:17px}.kpi b{display:block;font-size:26px}.kpi span{font-size:11px;color:var(--dim)}.skeleton-row{height:12px;border-radius:999px;margin:10px 0;background:linear-gradient(90deg,rgba(255,255,255,.045),rgba(255,255,255,.11),rgba(255,255,255,.045));background-size:300% 100%;animation:shimmer 2.8s infinite}@keyframes shimmer{from{background-position:100%}to{background-position:0%}}
.canvas-wrap{position:absolute;inset:86px 0 0 0;display:none;overflow:hidden}.canvas-wrap.show{display:block}.canvas{position:absolute;left:0;top:0;width:9000px;height:6200px;transform-origin:0 0;will-change:transform}.link-svg{position:absolute;left:0;top:0;width:9000px;height:6200px;pointer-events:none;overflow:visible}.node{position:absolute;width:260px;min-height:126px;background:var(--panel2);border:1px solid var(--line);border-radius:36px 24px 38px 26px;padding:16px;box-shadow:0 16px 50px rgba(0,0,0,.2);backdrop-filter:blur(16px);cursor:grab;transition:box-shadow .2s ease,border-color .2s ease,opacity .2s ease,filter .2s ease,transform .2s ease;user-select:none}.node:active{cursor:grabbing}.node:hover{border-color:rgba(130,232,184,.38);box-shadow:var(--glow),0 20px 60px rgba(0,0,0,.28)}.node.active{border-color:rgba(126,217,238,.75);box-shadow:0 0 0 1px rgba(126,217,238,.18),var(--glow)}.node.faded{opacity:.34;filter:saturate(.45) blur(.2px)}.node .type{font-size:10px;border-radius:999px;padding:3px 10px;display:inline-block;letter-spacing:.08em}.tag-note{color:var(--lav);background:rgba(184,168,238,.18)}.tag-decision{color:var(--mint);background:rgba(130,232,184,.17)}.tag-task{color:var(--cyan);background:rgba(126,217,238,.17)}.tag-meeting{color:var(--warn);background:rgba(233,201,136,.16)}.tag-file{color:#efb7b7;background:rgba(236,154,154,.14)}.node-title{font-size:15px;font-weight:650;margin-top:9px;line-height:1.4}.node-sub{margin-top:8px;font-size:11px;color:var(--dim);line-height:1.45;overflow-wrap:anywhere;word-break:break-word}.pill{display:inline-block;margin-top:9px;border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-size:10px;color:var(--dim)}.task-check{position:absolute;right:14px;top:14px;width:25px;height:25px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(126,217,238,.38);color:var(--cyan);background:rgba(126,217,238,.08);font-weight:800}.task-check.done{background:rgba(130,232,184,.24);color:var(--mint);border-color:rgba(130,232,184,.62)}
.orb{position:fixed;width:66px;height:66px;border-radius:50%;z-index:80;display:grid;place-items:center;background:radial-gradient(circle at 32% 28%,rgba(244,239,223,.82),rgba(130,232,184,.45) 32%,rgba(126,217,238,.25) 64%,rgba(184,168,238,.24));border:1px solid rgba(255,255,255,.2);box-shadow:0 0 34px rgba(130,232,184,.25),0 20px 55px rgba(0,0,0,.28);cursor:grab;user-select:none;transition:filter .18s ease,opacity .18s ease}.orb:active{cursor:grabbing}.orb .glyph{font-size:22px;text-shadow:0 1px 12px rgba(0,0,0,.45)}.splay-orb{left:28px;bottom:28px}.workspace-orb{right:28px;bottom:28px;background:radial-gradient(circle at 30% 25%,rgba(244,239,223,.78),rgba(184,168,238,.44) 34%,rgba(126,217,238,.22) 68%)}.orb.active{z-index:200}.orb.dimmed,.float-panel.dimmed{opacity:.32;filter:saturate(.4) blur(.2px)}
.orb-menu{position:fixed;z-index:79;display:none;pointer-events:none}.orb-menu.show{display:block}.orb-item{position:absolute;min-width:142px;padding:11px 15px;border-radius:999px;background:rgba(12,27,25,.78);border:1px solid var(--line);backdrop-filter:blur(18px);box-shadow:var(--shadow);font-size:12px;white-space:nowrap;pointer-events:auto;cursor:pointer;transform:scale(.6);opacity:0;animation:pop .28s forwards}.orb-item:hover{background:rgba(130,232,184,.17)}@keyframes pop{to{transform:scale(1);opacity:1}}
.palette{position:fixed;left:50%;top:15vh;transform:translateX(-50%) translateY(-8px);width:min(720px,calc(100vw - 36px));background:rgba(10,23,22,.86);border:1px solid var(--line);border-radius:38px;padding:18px;box-shadow:var(--shadow);backdrop-filter:blur(24px);z-index:180;display:none;opacity:0}.palette.show{display:block;animation:pal .18s forwards}@keyframes pal{to{opacity:1;transform:translateX(-50%) translateY(0)}}.palette input{font-size:15px;padding:14px 18px}.command-list{margin-top:12px;max-height:310px;overflow:auto;display:grid;gap:8px}.command-item{padding:12px 16px;border-radius:24px;background:rgba(255,255,255,.045);border:1px solid transparent;cursor:pointer}.command-item:hover{border-color:rgba(130,232,184,.3);background:rgba(130,232,184,.10)}
.float-panel{position:fixed;background:rgba(10,23,22,.86);border:1px solid var(--line);border-radius:40px 32px 44px 34px;box-shadow:var(--shadow);backdrop-filter:blur(24px);z-index:90;transition:opacity .2s ease,filter .2s ease}.detail-panel{right:28px;top:92px;width:min(470px,calc(100vw - 54px));max-height:calc(100vh - 126px);display:none;overflow:hidden}.detail-panel.show{display:block}.panel-head{padding:18px 21px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.panel-body{padding:16px 22px 24px;overflow:auto;max-height:calc(100vh - 200px)}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.log-drawer{left:28px;top:92px;width:390px;max-height:58vh;display:none;overflow:hidden}.log-drawer.show{display:block}.log-list{padding:14px 18px;overflow:auto;max-height:calc(58vh - 64px)}.log-entry{display:flex;gap:9px;border-bottom:1px solid rgba(255,255,255,.04);padding:7px 0;font-size:11px;color:var(--dim)}.log-time{opacity:.6;flex-shrink:0}.vault-panel{left:50%;top:52%;transform:translate(-50%,-50%);width:min(760px,calc(100vw - 44px));max-height:74vh;display:none;overflow:hidden}.vault-panel.show{display:block}.vault-list{display:grid;gap:10px}.vault-item{display:flex;justify-content:space-between;gap:12px;padding:13px 16px;border-radius:27px;background:rgba(255,255,255,.045);border:1px solid var(--line)}.vault-item div{min-width:0}.vault-item a{font-size:12px}
.minimap{position:fixed;right:26px;top:24px;width:178px;height:122px;border:1px solid var(--line);border-radius:26px;background:rgba(10,23,22,.56);backdrop-filter:blur(16px);z-index:45;overflow:hidden;display:none}.minimap.show{display:block}.mini-node{position:absolute;border-radius:6px;background:rgba(130,232,184,.62);width:6px;height:5px}.mini-view{position:absolute;border:1px solid rgba(126,217,238,.72);background:rgba(126,217,238,.08);border-radius:8px}.zoom-pill{position:fixed;bottom:110px;right:28px;z-index:50;display:none;gap:5px}.zoom-pill.show{display:flex}.zoom-pill button{padding:8px 11px}.connection-editor{display:flex;gap:8px;align-items:center;margin-top:8px}.connection-editor select{flex:1}.hint{font-size:11px;color:var(--mute);line-height:1.7}.empty{height:260px;display:grid;place-items:center;color:var(--dim);text-align:center}.save-state{position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:45;font-size:11px;color:var(--dim);background:rgba(10,23,22,.48);border:1px solid var(--line);border-radius:999px;padding:8px 14px;backdrop-filter:blur(14px)}
@media(max-width:760px){.home-grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.minimap{display:none!important}.log-drawer{width:calc(100vw - 48px)}.node{width:230px}.hud{left:24px;transform:none;text-align:left}.top-actions{display:none}.canvas-wrap{inset:78px 0 0}}
</style>
</head>
<body>
<div class="app">
  <div class="hud"><h1>Splay OS</h1><div class="sub" id="hudSub">Decision Canvas · v0.4</div></div>
  <div class="top-actions"><button onclick="togglePalette()">⌘K</button><button onclick="closeWorkspace()">Spaceを閉じる</button></div>
  <section class="home show" id="homeView"></section>
  <section class="canvas-wrap" id="canvasWrap"><div class="canvas" id="canvas"><svg class="link-svg" id="linkSvg"></svg><div id="nodeLayer"></div></div></section>
  <div class="minimap" id="minimap"><div class="mini-view" id="miniView"></div></div>
  <div class="zoom-pill" id="zoomPill"><button onclick="zoomBy(.12)">＋</button><button onclick="zoomBy(-.12)">－</button><button onclick="resetView()">◎</button></div>
  <div class="orb splay-orb" id="splayOrb" data-float="orb"><span class="glyph">✦</span></div><div class="orb-menu" id="splayMenu"></div>
  <div class="orb workspace-orb" id="workspaceOrb" data-float="orb"><span class="glyph">◌</span></div><div class="orb-menu" id="workspaceMenu"></div>
  <div class="palette" id="palette"><input id="paletteInput" placeholder="Command / Workspace / Node を検索…"><div class="command-list" id="commandList"></div></div>
  <div class="float-panel detail-panel" id="detailPanel" data-float="panel"><div class="panel-head"><b id="detailTitle">Node</b><div><button onclick="deleteActiveNode()" class="danger">削除</button><button onclick="closeDetail()">✕</button></div></div><div class="panel-body" id="detailBody"></div></div>
  <div class="float-panel log-drawer" id="logDrawer" data-float="panel"><div class="panel-head"><b>Activity Log</b><button onclick="toggleLog()">✕</button></div><div class="log-list" id="logList"></div></div>
  <div class="float-panel vault-panel" id="vaultPanel" data-float="panel"><div class="panel-head"><b>Vault</b><div><button onclick="addVaultLink()">＋資料</button><button onclick="toggleVault()">✕</button></div></div><div class="panel-body" id="vaultBody"></div></div>
  <div class="save-state" id="saveState">localStorage · autosaved</div>
</div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
<script>
const STORAGE_KEY='splay_os_state_v4';
const LEGACY_KEYS=['splay_os_state_v3','splay_os_state_v2','splay_os_state_v1'];
function uid(p){return p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4)}
function nowStr(){return new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
const labels={note:'Note',decision:'Decision',task:'Task',meeting:'Meeting',file:'File / Link'};
const tagCls={note:'tag-note',decision:'tag-decision',task:'tag-task',meeting:'tag-meeting',file:'tag-file'};
const decisionStatuses=['未検討','検討中','仮決定','決定','保留','却下'];
const taskStatuses=['TODO','Doing','Waiting','Blocked','Done'];
let zTop=200;
function defaultState(){
  const wsNames=['Command','Strategy','Meeting','Finance','Research','Vault']; const ws={}; wsNames.forEach(n=>ws[n]=uid('ws'));
  const nodes=[]; const dts=['出店エリア','家賃上限','店舗面積','想定客単価','ソンス風再現度','駐車場要否','金融機関説明方針','候補物件絞り込み条件'];
  dts.forEach((t,i)=>nodes.push({id:uid('node'),type:'decision',workspaceId:ws.Strategy,title:t,x:620+(i%4)*330,y:520+Math.floor(i/4)*230,z:10+i,links:[],createdAt:Date.now(),updatedAt:Date.now(),data:{theme:t,status:'未検討',importance:'中',hypothesis:'',evidence:'',pros:'',cons:'',risk:'',decision:'',nextCheck:'',memo:''}}));
  ['次回会議で家賃上限を決める','候補物件を10件に絞る','ソンス風カフェの参考写真を集める','金融機関向け説明資料の骨子を作る'].forEach((t,i)=>nodes.push({id:uid('node'),type:'task',workspaceId:ws.Strategy,title:t,x:720+(i%2)*360,y:1080+Math.floor(i/2)*210,z:30+i,links:[],createdAt:Date.now(),updatedAt:Date.now(),data:{name:t,status:'TODO',owner:'',due:'',memo:''}}));
  [{name:'物件統合マップ',url:'all_properties_map.html'},{name:'事業計画・融資向け分析レポート',url:'cafe_business_analysis_report.html'},{name:'営業シミュレーション一覧',url:'simulation_index.html'},{name:'カフェ事業ダッシュボード',url:'cafe_business_dashboard.html'}].forEach((f,i)=>nodes.push({id:uid('node'),type:'file',workspaceId:ws.Vault,title:f.name,x:650+(i%2)*360,y:560+Math.floor(i/2)*220,z:50+i,links:[],createdAt:Date.now(),updatedAt:Date.now(),data:{name:f.name,url:f.url,memo:''}}));
  return {version:'0.4',mode:'home',workspaces:Object.entries(ws).map(([name,id])=>({id,name,description:''})),activeWorkspaceId:ws.Strategy,activeNodeId:null,nodes,view:{x:-360,y:-290,scale:1},todayFocus:'会議で決める論点を絞り、根拠と未決事項を見える状態にする',logs:[{id:uid('log'),time:nowStr(),text:'Splay OS v0.4 Canvas 初期化'}],ui:{splayOrb:{x:28,y:null,bottom:28},workspaceOrb:{x:null,y:null,right:28,bottom:28}},vaultUnlocked:false,vaultPassword:'1234'};
}
function migrate(st){
  if(!st||!st.workspaces||!st.nodes)return defaultState(); st.version='0.4'; st.view=st.view||{x:-360,y:-290,scale:1}; st.mode=st.mode||'home'; st.ui=st.ui||{}; st.ui.splayOrb=st.ui.splayOrb||{x:28,bottom:28}; st.ui.workspaceOrb=st.ui.workspaceOrb||{right:28,bottom:28};
  st.nodes.forEach((n,i)=>{ if(typeof n.x!=='number')n.x=520+(i%4)*330; if(typeof n.y!=='number')n.y=520+Math.floor(i/4)*220; if(typeof n.z!=='number')n.z=10+i; if(!Array.isArray(n.links))n.links=[]; if(!n.data)n.data={}; if(n.type==='file'&&n.data.memo==null)n.data.memo=''; if(n.type==='decision'&&n.data.memo==null)n.data.memo=''; });
  return st;
}
function load(){try{let raw=localStorage.getItem(STORAGE_KEY); if(!raw){for(const k of LEGACY_KEYS){raw=localStorage.getItem(k); if(raw)break}} return raw?migrate(JSON.parse(raw)):defaultState()}catch(e){return defaultState()}}
let state=load();
function save(flash=false){localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); if(flash){const el=document.getElementById('saveState');el.textContent='saved · '+nowStr();setTimeout(()=>el.textContent='localStorage · autosaved',1300)}}
function log(text){state.logs.unshift({id:uid('log'),time:nowStr(),text}); if(state.logs.length>300)state.logs.pop(); save(); renderLog()}
function count(){let decided=0,considering=0,pending=0,open=0;state.nodes.forEach(n=>{if(n.type==='decision'){if(['決定','仮決定'].includes(n.data.status))decided++;else if(n.data.status==='検討中')considering++;else if(n.data.status==='保留')pending++} if(n.type==='task'&&n.data.status!=='Done')open++});return{decided,considering,pending,open}}
function activeWs(){return state.workspaces.find(w=>w.id===state.activeWorkspaceId)||state.workspaces[0]}
function openWorkspace(id){state.activeWorkspaceId=id;state.mode='workspace';state.activeNodeId=null;save();render();log('Workspaceを開く: '+(activeWs()?.name||''))}
function closeWorkspace(){state.mode='home';state.activeNodeId=null;save();render();}
function addWorkspace(){const name=prompt('Workspace名');if(!name)return;const ws={id:uid('ws'),name:name.trim(),description:''};state.workspaces.push(ws);state.activeWorkspaceId=ws.id;state.mode='workspace';log('Workspace追加: '+ws.name);save();render()}
function deleteWorkspace(id){const ws=state.workspaces.find(w=>w.id===id); if(!ws||!confirm('Workspace「'+ws.name+'」を削除しますか？'))return; state.nodes=state.nodes.filter(n=>n.workspaceId!==id); state.workspaces=state.workspaces.filter(w=>w.id!==id); state.activeWorkspaceId=state.workspaces[0]?.id||null; log('Workspace削除: '+ws.name); save(); render()}
function createNode(type){const ws=activeWs(); if(!ws){addWorkspace();return} const center=screenToCanvas(innerWidth/2,innerHeight/2); const data={note:{body:'',memo:''},decision:{theme:'',status:'未検討',importance:'中',hypothesis:'',evidence:'',pros:'',cons:'',risk:'',decision:'',nextCheck:'',memo:''},task:{name:'',status:'TODO',owner:'',due:'',memo:''},meeting:{meetingName:'',date:'',agenda:'',notes:'',decisions:'',pending:'',nextActions:'',memo:''},file:{name:'',url:'',memo:''}}[type]; const n={id:uid('node'),type,workspaceId:ws.id,title:'新しい'+labels[type],x:center.x-130+Math.random()*80,y:center.y-70+Math.random()*80,z:++zTop,links:[],createdAt:Date.now(),updatedAt:Date.now(),data}; state.nodes.push(n); state.activeNodeId=n.id; log('Node追加: ['+labels[type]+'] '+n.title); save(); render(); openDetail(n.id)}
function activeNodes(){const ws=activeWs();return state.nodes.filter(n=>n.workspaceId===ws?.id)}
function nodeTitle(n){return n.title||n.data?.theme||n.data?.name||labels[n.type]}
function openDetail(id){state.activeNodeId=id; const n=state.nodes.find(x=>x.id===id); if(n)n.z=++zTop; save(); renderNodes(); renderLinks(); renderDetail(); const p=document.getElementById('detailPanel'); p.classList.add('show'); touchFloat(p)}
function closeDetail(){document.getElementById('detailPanel').classList.remove('show');state.activeNodeId=null;save();renderNodes();renderLinks()}
function deleteActiveNode(){if(!state.activeNodeId)return; const n=state.nodes.find(x=>x.id===state.activeNodeId); if(!n||!confirm('「'+nodeTitle(n)+'」を削除しますか？'))return; state.nodes.forEach(x=>x.links=(x.links||[]).filter(id=>id!==n.id)); state.nodes=state.nodes.filter(x=>x.id!==n.id); log('Node削除: '+nodeTitle(n)); state.activeNodeId=null; save(); render();}
function updateNode(id,key,val,isTitle=false){const n=state.nodes.find(x=>x.id===id);if(!n)return;if(isTitle)n.title=val;else n.data[key]=val;n.updatedAt=Date.now();save();renderNodes();renderLinks();renderMinimap()}
function changeStatus(id,val){const n=state.nodes.find(x=>x.id===id);if(!n)return;const old=n.data.status;n.data.status=val;n.updatedAt=Date.now();if(old!==val)log('ステータス変更: '+nodeTitle(n)+' '+old+' → '+val);save();renderNodes();renderDetail();renderHome()}
function toggleTaskDone(id,e){e.stopPropagation();const n=state.nodes.find(x=>x.id===id);if(!n)return;const old=n.data.status;n.data.status=old==='Done'?'TODO':'Done';n.updatedAt=Date.now();log((n.data.status==='Done'?'タスク完了: ':'タスク未完了へ戻す: ')+nodeTitle(n));save();render();}
function addLink(fromId,toId){const a=state.nodes.find(n=>n.id===fromId); if(!a||!toId||fromId===toId)return; a.links=a.links||[]; if(!a.links.includes(toId)){a.links.push(toId);log('接続線追加: '+nodeTitle(a)+' → '+nodeTitle(state.nodes.find(n=>n.id===toId)));save();renderLinks();renderDetail()}}
function removeLink(fromId,toId){const a=state.nodes.find(n=>n.id===fromId); if(!a)return; a.links=(a.links||[]).filter(id=>id!==toId); log('接続線削除: '+nodeTitle(a)); save(); renderLinks(); renderDetail()}
function render(){document.getElementById('homeView').classList.toggle('show',state.mode==='home');document.getElementById('canvasWrap').classList.toggle('show',state.mode==='workspace');document.getElementById('minimap').classList.toggle('show',state.mode==='workspace');document.getElementById('zoomPill').classList.toggle('show',state.mode==='workspace');document.getElementById('hudSub').textContent=state.mode==='workspace'?(activeWs()?.name||'Workspace')+' · Canvas':'Decision Canvas · v0.4';renderHome();renderCanvas();renderMenus();renderLog();renderVault();positionOrbs();}
function renderHome(){const c=count();document.getElementById('homeView').innerHTML=`<div class="home-grid"><div class="home-card"><h2>Good evening.</h2><p>Splay OSは、情報ではなく意思決定を保存する空間です。Workspace一覧はOrbに格納しました。ここは今日のFocusと未決事項だけを残します。</p><div class="kpis"><div class="kpi"><b>${c.decided}</b><span>決定済み</span></div><div class="kpi"><b>${c.considering}</b><span>検討中</span></div><div class="kpi"><b>${c.pending}</b><span>保留</span></div><div class="kpi"><b>${c.open}</b><span>未完了Task</span></div></div><button class="primary" style="margin-top:22px" onclick="openWorkspace(state.activeWorkspaceId)">前回Workspaceへ戻る</button></div><div class="home-card"><h2>Today's Focus</h2><p>${esc(state.todayFocus)}</p><div class="skeleton-row" style="width:88%"></div><div class="skeleton-row" style="width:58%"></div><div class="hint">未入力・未決定は空白ではなく、次の会議で決めるべき余白です。</div></div></div>`}
function renderCanvas(){if(state.mode!=='workspace')return;applyView();renderNodes();renderLinks();renderMinimap()}
function renderNodes(){const layer=document.getElementById('nodeLayer');layer.innerHTML='';activeNodes().forEach(n=>{const el=document.createElement('div');el.className='node '+(n.id===state.activeNodeId?'active ':'')+(state.activeNodeId&&n.id!==state.activeNodeId?'faded':'');el.style.left=n.x+'px';el.style.top=n.y+'px';el.style.zIndex=n.z||1;el.dataset.id=n.id;let sub=''; if(n.type==='decision')sub='重要度: '+(n.data.importance||'-'); if(n.type==='task')sub=(n.data.owner?'担当: '+n.data.owner:'担当未設定'); if(n.type==='meeting')sub=n.data.date||'日付未設定'; if(n.type==='file')sub=n.data.url||'パス未設定'; if(n.type==='note')sub=(n.data.body||'本文未入力').slice(0,50);el.innerHTML=`${n.type==='task'?`<div class="task-check ${n.data.status==='Done'?'done':''}" title="完了切替">${n.data.status==='Done'?'✓':'○'}</div>`:''}<span class="type ${tagCls[n.type]}">${labels[n.type]}</span><div class="node-title">${esc(nodeTitle(n))}</div><div class="node-sub">${esc(sub)}</div>${(n.data.status?`<span class="pill">${esc(n.data.status)}</span>`:'')}`;el.addEventListener('pointerdown',ev=>startNodeDrag(ev,n.id));el.addEventListener('dblclick',ev=>{ev.stopPropagation();openDetail(n.id)});el.addEventListener('click',ev=>{if(ev.target.classList.contains('task-check')){toggleTaskDone(n.id,ev);return} openDetail(n.id)});layer.appendChild(el)})}
function renderLinks(){const svg=document.getElementById('linkSvg');svg.innerHTML='';const ns='http://www.w3.org/2000/svg';activeNodes().forEach(a=>{(a.links||[]).forEach(id=>{const b=state.nodes.find(n=>n.id===id&&n.workspaceId===a.workspaceId);if(!b)return;const path=document.createElementNS(ns,'path');const ax=a.x+130,ay=a.y+63,bx=b.x+130,by=b.y+63;const mx=(ax+bx)/2;path.setAttribute('d',`M ${ax} ${ay} C ${mx} ${ay}, ${mx} ${by}, ${bx} ${by}`);path.setAttribute('fill','none');path.setAttribute('stroke','rgba(126,217,238,.36)');path.setAttribute('stroke-width','2');path.setAttribute('stroke-linecap','round');svg.appendChild(path)})})}
function renderMenus(){renderSplayMenu();renderWorkspaceMenu();}
function renderSplayMenu(){const items=[['🏠 Home',()=>closeWorkspace()],['🪐 Workspace一覧',()=>toggleWorkspaceMenu(true)],['＋ Decision',()=>createNode('decision')],['＋ Task',()=>createNode('task')],['＋ Note',()=>createNode('note')],['🔒 Vault',()=>toggleVault()],['📜 Log',()=>toggleLog()],['⇩ Export',()=>exportJSON()],['⇧ Import',()=>document.getElementById('importFile').click()],['⚙ Reset',()=>resetAll()]];makeOrbMenu('splayMenu','splayOrb',items)}
function renderWorkspaceMenu(){const items=state.workspaces.map(ws=>['◌ '+ws.name,()=>openWorkspace(ws.id)]);items.push(['＋ 新規Workspace',()=>addWorkspace()]);items.push(['✕ 現在のSpaceを閉じる',()=>closeWorkspace()]);makeOrbMenu('workspaceMenu','workspaceOrb',items)}
function makeOrbMenu(menuId,orbId,items){const m=document.getElementById(menuId);m.innerHTML='';const o=document.getElementById(orbId).getBoundingClientRect();m.style.left=o.left+'px';m.style.top=o.top+'px';const radius=92;items.forEach((it,i)=>{const angle=(-145+(i*(260/Math.max(1,items.length-1))))*Math.PI/180;let x=Math.cos(angle)*radius,y=Math.sin(angle)*radius; if(o.left+x<8)x=8-o.left;if(o.left+x+165>innerWidth)x=innerWidth-o.left-170;if(o.top+y<8)y=8-o.top;if(o.top+y+44>innerHeight)y=innerHeight-o.top-50;const el=document.createElement('div');el.className='orb-item';el.style.left=x+'px';el.style.top=y+'px';el.style.animationDelay=(i*18)+'ms';el.textContent=it[0];el.onclick=()=>{hideMenus();it[1]()};m.appendChild(el)})}
function hideMenus(){document.getElementById('splayMenu').classList.remove('show');document.getElementById('workspaceMenu').classList.remove('show')}
function toggleWorkspaceMenu(force){const m=document.getElementById('workspaceMenu');document.getElementById('splayMenu').classList.remove('show');renderWorkspaceMenu();m.classList.toggle('show',force===true?true:undefined);touchFloat(document.getElementById('workspaceOrb'))}
function toggleSplayMenu(){const m=document.getElementById('splayMenu');document.getElementById('workspaceMenu').classList.remove('show');renderSplayMenu();m.classList.toggle('show');touchFloat(document.getElementById('splayOrb'))}
function renderDetail(){const n=state.nodes.find(x=>x.id===state.activeNodeId);const body=document.getElementById('detailBody');if(!n){body.innerHTML='';return}document.getElementById('detailTitle').textContent=labels[n.type]+' · '+nodeTitle(n);let html=`<label>タイトル</label><input value="${esc(n.title)}" oninput="updateNode('${n.id}','title',this.value,true)">`;if(n.type==='note'){html+=field(n,'body','本文','textarea')+field(n,'memo','メモ','textarea')}if(n.type==='decision'){html+=field(n,'theme','テーマ')+selectStatus(n,decisionStatuses)+selectField(n,'importance','重要度',['低','中','高','最重要'])+field(n,'hypothesis','仮説','textarea')+field(n,'evidence','根拠','textarea')+`<div class="two">${field(n,'pros','メリット','textarea')}${field(n,'cons','デメリット','textarea')}</div>`+field(n,'risk','リスク','textarea')+field(n,'decision','決定内容','textarea')+field(n,'nextCheck','次回確認事項','textarea')+field(n,'memo','メモ','textarea')}if(n.type==='task'){html+=field(n,'name','タスク名')+selectStatus(n,taskStatuses)+`<div class="two">${field(n,'owner','担当')}${field(n,'due','期限','date')}</div>`+field(n,'memo','メモ','textarea')}if(n.type==='meeting'){html+=field(n,'meetingName','会議名')+field(n,'date','日付','date')+field(n,'agenda','アジェンダ','textarea')+field(n,'notes','議論メモ','textarea')+field(n,'decisions','決定事項','textarea')+field(n,'pending','保留事項','textarea')+field(n,'nextActions','次回アクション','textarea')+field(n,'memo','メモ','textarea')}if(n.type==='file'){html+=field(n,'name','資料名')+field(n,'url','URL / 相対パス')+field(n,'memo','メモ','textarea')+(n.data.url?`<p><a href="${esc(n.data.url)}" target="_blank">↗ ${esc(n.data.url)}</a></p>`:'')}html+=connectionEditor(n);body.innerHTML=html}
function field(n,key,label,type='input'){const v=n.data[key]??'';return `<div><label>${label}</label>${type==='textarea'?`<textarea oninput="updateNode('${n.id}','${key}',this.value)">${esc(v)}</textarea>`:`<input type="${type}" value="${esc(v)}" oninput="updateNode('${n.id}','${key}',this.value)">`}</div>`}
function selectField(n,key,label,opts){return `<div><label>${label}</label><select onchange="updateNode('${n.id}','${key}',this.value)">${opts.map(o=>`<option ${o===(n.data[key]||'')?'selected':''}>${o}</option>`).join('')}</select></div>`}
function selectStatus(n,opts){return `<div><label>ステータス</label><select onchange="changeStatus('${n.id}',this.value)">${opts.map(o=>`<option ${o===(n.data.status||'')?'selected':''}>${o}</option>`).join('')}</select></div>`}
function connectionEditor(n){const others=activeNodes().filter(x=>x.id!==n.id);return `<label>接続線</label><div class="connection-editor"><select id="linkSelect">${others.map(o=>`<option value="${o.id}">${esc(nodeTitle(o))}</option>`).join('')}</select><button onclick="addLink('${n.id}',document.getElementById('linkSelect').value)">接続</button></div><div class="tag-row">${(n.links||[]).map(id=>{const o=state.nodes.find(x=>x.id===id);return o?`<button onclick="removeLink('${n.id}','${id}')">× ${esc(nodeTitle(o))}</button>`:''}).join('')}</div>`}
function renderLog(){document.getElementById('logList').innerHTML=state.logs.slice(0,80).map(l=>`<div class="log-entry"><span class="log-time">${esc(l.time)}</span><span>${esc(l.text)}</span></div>`).join('')}
function renderVault(){const body=document.getElementById('vaultBody');const files=state.nodes.filter(n=>n.type==='file');body.innerHTML=`<div class="vault-list">${files.map(n=>`<div class="vault-item"><div><b>${esc(n.data.name||n.title)}</b><br><a href="${esc(n.data.url||'#')}" target="_blank">${esc(n.data.url||'未設定')}</a><div class="hint">${esc(n.data.memo||'')}</div></div><button onclick="openWorkspace('${n.workspaceId}');openDetail('${n.id}')">編集</button></div>`).join('')}</div>`}
function addVaultLink(){const name=prompt('資料名');if(!name)return;const url=prompt('URL / 相対パス')||'';const vault=state.workspaces.find(w=>w.name==='Vault')||activeWs();state.nodes.push({id:uid('node'),type:'file',workspaceId:vault.id,title:name,x:600+Math.random()*360,y:540+Math.random()*240,z:++zTop,links:[],createdAt:Date.now(),updatedAt:Date.now(),data:{name,url,memo:''}});log('Vault資料追加: '+name);save();render()}
function applyView(){const c=document.getElementById('canvas');c.style.transform=`translate(${state.view.x}px,${state.view.y}px) scale(${state.view.scale})`}
function screenToCanvas(x,y){return{x:(x-state.view.x)/state.view.scale,y:(y-state.view.y)/state.view.scale}}
function zoomBy(delta,clientX=innerWidth/2,clientY=innerHeight/2){const before=screenToCanvas(clientX,clientY);state.view.scale=Math.max(.35,Math.min(1.9,state.view.scale+delta));state.view.x=clientX-before.x*state.view.scale;state.view.y=clientY-before.y*state.view.scale;save();applyView();renderMinimap()}
function resetView(){state.view={x:-360,y:-290,scale:1};save();applyView();renderMinimap()}
let pan=null,drag=null,dragOrb=null;
document.getElementById('canvasWrap').addEventListener('wheel',e=>{e.preventDefault();zoomBy(e.deltaY<0?.1:-.1,e.clientX,e.clientY)},{passive:false});
document.getElementById('canvasWrap').addEventListener('pointerdown',e=>{if(e.target.id!=='canvasWrap'&&e.target.id!=='canvas'&&e.target.id!=='linkSvg')return;pan={x:e.clientX,y:e.clientY,vx:state.view.x,vy:state.view.y};closeDetail()});
window.addEventListener('pointermove',e=>{if(pan){state.view.x=pan.vx+e.clientX-pan.x;state.view.y=pan.vy+e.clientY-pan.y;applyView();renderMinimap()} if(drag){const n=state.nodes.find(x=>x.id===drag.id);if(n){const p=screenToCanvas(e.clientX,e.clientY);n.x=p.x-drag.ox;n.y=p.y-drag.oy;renderNodes();renderLinks();renderMinimap()}} if(dragOrb){const el=dragOrb.el;el.style.left=(e.clientX-dragOrb.ox)+'px';el.style.top=(e.clientY-dragOrb.oy)+'px';el.style.right='auto';el.style.bottom='auto';renderMenus();}})
window.addEventListener('pointerup',()=>{if(pan){save();pan=null} if(drag){const n=state.nodes.find(x=>x.id===drag.id);if(n)log('Node移動: '+nodeTitle(n));save();drag=null} if(dragOrb){const id=dragOrb.el.id==='splayOrb'?'splayOrb':'workspaceOrb';state.ui[id]={x:parseFloat(dragOrb.el.style.left),y:parseFloat(dragOrb.el.style.top)};save();dragOrb=null}})
function startNodeDrag(e,id){if(e.target.classList.contains('task-check'))return;const n=state.nodes.find(x=>x.id===id);if(!n)return;n.z=++zTop;state.activeNodeId=id;const p=screenToCanvas(e.clientX,e.clientY);drag={id,ox:p.x-n.x,oy:p.y-n.y};renderNodes();renderLinks();renderDetail();document.getElementById('detailPanel').classList.add('show');e.stopPropagation()}
function makeOrbDraggable(el,toggle){el.addEventListener('click',e=>{if(Math.abs((e.clientX-(el._downX||e.clientX)))<4&&Math.abs((e.clientY-(el._downY||e.clientY)))<4)toggle();});el.addEventListener('pointerdown',e=>{touchFloat(el);el._downX=e.clientX;el._downY=e.clientY;const r=el.getBoundingClientRect();dragOrb={el,ox:e.clientX-r.left,oy:e.clientY-r.top};e.stopPropagation()})}
function positionOrbs(){[['splayOrb',state.ui.splayOrb],['workspaceOrb',state.ui.workspaceOrb]].forEach(([id,pos])=>{const el=document.getElementById(id); if(pos.x!=null){el.style.left=pos.x+'px';el.style.top=(pos.y??(innerHeight-94))+'px';el.style.right='auto';el.style.bottom='auto'}else{el.style.left='auto';el.style.top='auto';el.style.right=(pos.right??28)+'px';el.style.bottom=(pos.bottom??28)+'px'}})}
function touchFloat(el){zTop++;document.querySelectorAll('[data-float]').forEach(x=>{x.classList.toggle('dimmed',x!==el)});el.classList.add('active');el.style.zIndex=zTop;clearTimeout(window.__dimTimer);window.__dimTimer=setTimeout(()=>{document.querySelectorAll('[data-float]').forEach(x=>x.classList.remove('dimmed','active'))},1000)}
function renderMinimap(){const m=document.getElementById('minimap');if(state.mode!=='workspace')return;m.querySelectorAll('.mini-node').forEach(x=>x.remove());const sx=178/9000,sy=122/6200;activeNodes().forEach(n=>{const d=document.createElement('div');d.className='mini-node';d.style.left=(n.x*sx)+'px';d.style.top=(n.y*sy)+'px';m.appendChild(d)});const v=document.getElementById('miniView');v.style.left=(-state.view.x/state.view.scale*sx)+'px';v.style.top=(-state.view.y/state.view.scale*sy)+'px';v.style.width=(innerWidth/state.view.scale*sx)+'px';v.style.height=(innerHeight/state.view.scale*sy)+'px'}
function togglePalette(){const p=document.getElementById('palette');p.classList.toggle('show');touchFloat(p);renderCommands();setTimeout(()=>document.getElementById('paletteInput').focus(),30)}
function renderCommands(){const q=(document.getElementById('paletteInput').value||'').toLowerCase();const cmds=[['Home',()=>closeWorkspace()],['Open Vault',()=>toggleVault()],['Activity Log',()=>toggleLog()],['Add Decision',()=>createNode('decision')],['Add Task',()=>createNode('task')],['Add Note',()=>createNode('note')],['Export JSON',()=>exportJSON()],['Import JSON',()=>document.getElementById('importFile').click()],...state.workspaces.map(w=>['Workspace: '+w.name,()=>openWorkspace(w.id)]),...state.nodes.map(n=>['Node: '+nodeTitle(n),()=>{openWorkspace(n.workspaceId);openDetail(n.id)}])].filter(c=>c[0].toLowerCase().includes(q));document.getElementById('commandList').innerHTML=cmds.slice(0,40).map((c,i)=>`<div class="command-item" data-i="${i}">${esc(c[0])}</div>`).join('');document.querySelectorAll('.command-item').forEach((el,i)=>el.onclick=()=>{document.getElementById('palette').classList.remove('show');cmds[i][1]()})}
document.getElementById('paletteInput').addEventListener('input',renderCommands);document.getElementById('paletteInput').addEventListener('keydown',e=>{if(e.key==='Enter'){const first=document.querySelector('.command-item');if(first)first.click()}})
function toggleLog(){const p=document.getElementById('logDrawer');p.classList.toggle('show');touchFloat(p)}
function toggleVault(){const p=document.getElementById('vaultPanel');p.classList.toggle('show');renderVault();touchFloat(p)}
function exportJSON(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='splay_os_v04_'+Date.now()+'.json';a.click();log('JSON Export')}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{state=migrate(JSON.parse(ev.target.result));log('JSON Import');save();render()}catch(err){alert('Import失敗')}};r.readAsText(f);e.target.value=''}
function resetAll(){if(confirm('初期状態に戻しますか？')){state=defaultState();save();render()}}
window.addEventListener('keydown',e=>{const tag=(document.activeElement?.tagName||'').toLowerCase();const typing=['input','textarea','select'].includes(tag);if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();togglePalette();return}if(e.key==='Escape'){hideMenus();document.getElementById('palette').classList.remove('show');document.getElementById('detailPanel').classList.remove('show');return}if(typing)return;if(e.key.toLowerCase()==='n')createNode('note');if(e.key.toLowerCase()==='w')toggleWorkspaceMenu(true);if(e.key.toLowerCase()==='l')toggleLog()});
makeOrbDraggable(document.getElementById('splayOrb'),toggleSplayMenu);makeOrbDraggable(document.getElementById('workspaceOrb'),()=>toggleWorkspaceMenu());
window.addEventListener('resize',()=>{renderMenus();renderMinimap();positionOrbs()});
render();save();
</script>
</body>
</html>
