<script>
(function(){
  'use strict';
  const DATA=JSON.parse(document.getElementById('splayMobileData').textContent);
  const TYPES=['all','task','decision','note','memo','meeting','file'];
  const TYPE_LABEL={all:'All',task:'Task',decision:'Decision',note:'Note',memo:'Memo',meeting:'Meeting',file:'File'};
  let typeFilter='all',statusFilter='all',query='';
  const expanded=new Set();
  const byId=id=>document.getElementById(id);
  function el(tag,attrs){const node=document.createElement(tag);Object.keys(attrs||{}).forEach(k=>{const v=attrs[k];if(v==null)return;if(k==='class')node.className=v;else if(k==='text')node.textContent=v;else node.setAttribute(k,v)});return node}
  function clear(node){while(node.firstChild)node.removeChild(node.firstChild)}
  function fmtDate(value){if(!value)return '';const d=new Date(value);return Number.isNaN(d.getTime())?'':d.toLocaleString(undefined,{year:'numeric',month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
  function safeUrl(url){
    const raw=String(url||'').trim();
    let compact='';
    for(const ch of raw){
      if(ch.charCodeAt(0)<=32)continue;
      compact+=ch;
    }
    compact=compact.toLowerCase();
    if(!raw||compact.startsWith('javascript:')||compact.startsWith('vbscript:')||compact.startsWith('data:text/html'))return '';
    return raw;
  }
  function addChip(parent,label,value,cls){if(!value&&value!==0)return;const c=el('span',{class:'mini '+(cls||''),text:label?label+': '+value:String(value)});parent.appendChild(c)}
  function searchable(node){return (node.searchText||'').includes(query)}
  function typeMatches(node){return typeFilter==='all'||node.type===typeFilter}
  function statusMatches(node){return statusFilter==='all'||String(node.data&&node.data.status||'')===statusFilter}
  function filteredNodes(){return DATA.nodes.filter(n=>searchable(n)&&typeMatches(n)&&statusMatches(n))}
  function renderHeader(){byId('wsIcon').textContent=DATA.workspace.icon||'S';byId('wsName').textContent=DATA.workspace.name||'Workspace';const desc=byId('wsDesc');desc.textContent=DATA.workspace.description||'';desc.style.display=DATA.workspace.description?'block':'none';const meta=byId('heroMeta');clear(meta);meta.appendChild(el('span',{class:'chip',text:DATA.summary.total+' Nodes'}));meta.appendChild(el('span',{class:'chip',text:'Generated '+fmtDate(DATA.generatedAt)}));if(DATA.sourceVersion)meta.appendChild(el('span',{class:'chip',text:'Splay OS v'+DATA.sourceVersion}))}
  function renderSummary(){const box=byId('summary');clear(box);TYPES.forEach(t=>{const c=el('div',{class:'chip'});c.appendChild(el('span',{text:TYPE_LABEL[t]}));c.appendChild(el('b',{text:String(t==='all'?DATA.summary.total:(DATA.summary[t]||0))}));box.appendChild(c)})}
  function renderFilters(){const box=byId('typeFilters');clear(box);TYPES.forEach(t=>{const b=el('button',{type:'button',class:t===typeFilter?'active':'','aria-pressed':t===typeFilter?'true':'false',text:TYPE_LABEL[t]+' '+(t==='all'?DATA.summary.total:(DATA.summary[t]||0))});b.addEventListener('click',()=>{typeFilter=t;renderAll()});box.appendChild(b)});const statuses=Array.from(new Set(DATA.nodes.map(n=>String(n.data&&n.data.status||'')).filter(Boolean))).sort();const sx=byId('statusFilters');clear(sx);sx.classList.toggle('show',statuses.length>0);['all'].concat(statuses).forEach(s=>{const b=el('button',{type:'button',class:s===statusFilter?'active':'','aria-pressed':s===statusFilter?'true':'false',text:s==='all'?'Any status':s});b.addEventListener('click',()=>{statusFilter=s;renderAll()});sx.appendChild(b)})}
  function renderCard(node){const card=el('article',{class:'card'+(expanded.has(node.id)?' open':'')});const head=el('button',{type:'button',class:'card-head','aria-expanded':expanded.has(node.id)?'true':'false','aria-label':'Toggle '+node.title});const top=el('div',{class:'card-top'});top.appendChild(el('span',{class:'type',text:node.typeLabel||node.type}));top.appendChild(el('span',{class:'updated',text:fmtDate(node.updatedAt)||fmtDate(node.createdAt)}));head.appendChild(top);if(node.presentation&&node.presentation.titleVisible!==false)head.appendChild(el('div',{class:'title',text:node.title||node.typeLabel||'Node'}));const meta=el('div',{class:'meta-row'});addChip(meta,'Status',node.data&&node.data.status,'important');addChip(meta,'Importance',node.data&&node.data.importance,'important');addChip(meta,'Owner',node.data&&node.data.owner);addChip(meta,'Due',node.data&&node.data.due);addChip(meta,'Due state',node.dueState&&node.dueState!=='none'?node.dueState:'');if(node.connections&&node.connections.length)addChip(meta,'Links',node.connections.length);head.appendChild(meta);if(node.groups&&node.groups.length){const row=el('div',{class:'group-row'});node.groups.forEach(g=>row.appendChild(el('span',{class:'mini',text:g.name})));head.appendChild(row)}head.addEventListener('click',()=>{expanded.has(node.id)?expanded.delete(node.id):expanded.add(node.id);renderCards()});card.appendChild(head);const body=el('div',{class:'card-body'});(node.fields||[]).forEach(f=>{const wrap=el('div',{class:'field'});wrap.appendChild(el('label',{text:f.label||f.key}));const val=el('div',{class:'value'});if(f.kind==='url'){const safe=safeUrl(f.value);if(safe){const a=el('a',{href:safe,target:'_blank',rel:'noopener noreferrer',text:String(f.value||'')});val.appendChild(a)}else val.textContent=String(f.value||'')}else val.textContent=String(f.value||'');wrap.appendChild(val);body.appendChild(wrap)});if(node.connections&&node.connections.length){const con=el('section',{class:'connections'});con.appendChild(el('label',{text:'Connections'}));node.connections.forEach(c=>{const row=el('div',{class:'conn'});row.appendChild(el('span',{text:'->'}));const tx=el('div');tx.appendChild(el('b',{text:c.targetTitle||'Node'}));const detail=[c.typeLabel,c.label,c.external?c.targetWorkspaceName:''].filter(Boolean).join(' · ');if(detail)tx.appendChild(el('em',{text:detail}));row.appendChild(tx);con.appendChild(row)});body.appendChild(con)}card.appendChild(body);return card}
  function renderCards(){const list=byId('cards');clear(list);const nodes=filteredNodes();nodes.forEach(n=>list.appendChild(renderCard(n)));byId('empty').classList.toggle('show',nodes.length===0)}
  function renderAll(){renderFilters();renderCards()}
  byId('search').addEventListener('input',e=>{query=String(e.target.value||'').toLowerCase();renderCards()});
  try{
    renderHeader();
    renderSummary();
    renderAll();
  }catch(error){
    console.error('Splay OS mobile view initialization failed',error);
    const empty=document.getElementById('empty');
    if(empty){
      empty.textContent='Mobile Viewの表示に失敗しました。Consoleを確認してください。';
      empty.classList.add('show');
    }
  }
})();
</script>
